# =============================================================================
#  ESPHome – wM-Bus Bridge (RAW-only)
#  Pełny przykład konfiguracji z komentarzami / Full configuration example
#
#  Radio: Heltec WiFi LoRa 32 V4 (ESP32-S3 + SX1262)
#  Projekt: https://github.com/Kustonium/esphome-wmbus-bridge-rawonly
# =============================================================================

# -----------------------------------------------------------------------------
# SUBSTITUTIONS – zmienne globalne / global variables
# Zmień devicename na własny, reszta jest opcjonalna.
# Change devicename to your own; the rest is optional.
# -----------------------------------------------------------------------------
substitutions:
  devicename: esphome-wmbus-heltec
  friendly_name: "wMBus Bridge Heltec V4"

# -----------------------------------------------------------------------------
# ESPHOME CORE
# -----------------------------------------------------------------------------
esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  min_version: 2026.1.3      # wymagana wersja ESPHome / required ESPHome version
  name_add_mac_suffix: false  # true = dodaje sufiks MAC do nazwy (wiele urządzeń)
                               # true = adds MAC suffix to name (multiple devices)

# -----------------------------------------------------------------------------
# PLATFORMA – ESP32-S3 (Heltec V4)
# Dla zwykłego ESP32 zmień na: variant: esp32, flash_size: 4MB, usuń psram
# For plain ESP32: variant: esp32, flash_size: 4MB, remove psram block
# -----------------------------------------------------------------------------
esp32:
  variant: esp32s3
  flash_size: 16MB
  cpu_frequency: 160MHz
  framework:
    type: esp-idf             # wymagane / required (Arduino nie jest wspierane)

# PSRAM – tylko ESP32-S3 z PSRAM (np. Heltec V4)
# Jeśli płytka nie ma PSRAM – usuń ten blok
# Only for ESP32-S3 boards with PSRAM (e.g. Heltec V4)
# If your board has no PSRAM – remove this block
psram:
  mode: quad

# -----------------------------------------------------------------------------
# ZEWNĘTRZNY KOMPONENT / EXTERNAL COMPONENT
# -----------------------------------------------------------------------------
external_components:
  - source: github://Kustonium/esphome-wmbus-bridge-rawonly@main
    components: [wmbus_radio]
    refresh: 0s               # 0s = zawsze używaj cache / always use cache
                               # np. 1d = sprawdzaj raz dziennie / e.g. 1d = check daily

# -----------------------------------------------------------------------------
# LOGGER
# Poziomy / levels: DEBUG < INFO < WARN < ERROR < NONE
# Zmień MAIN level na DEBUG żeby zobaczyć wszystko, w tym bajty SX1262.
# Change MAIN level to DEBUG to see everything including SX1262 bytes.
# -----------------------------------------------------------------------------
logger:
  level: info                 # zalecane dla produkcji / recommended for production
  # level: debug              # odkomentuj do diagnozy / uncomment for diagnosis
  logs:
    mqtt: warn                # MQTT wewnętrzne logi ESPHome – domyślnie dużo szumu
                               # ESPHome internal MQTT logs – noisy by default
    component: warn           # logi komponentów / component framework logs
    # SX1262: debug           # logi SX1262 (rejestracja pakietów, RSSI, itp.)
    # wmbus: debug            # logi warstwy wMBus

# -----------------------------------------------------------------------------
# SIEĆ / NETWORK
# -----------------------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none       # none = brak oszczędzania energii (lepszy odbiór)
                               # none = no power saving (better reception stability)

mdns:
  disabled: false             # true = wyłącz mDNS (mniej usług sieciowych)
                               # true = disable mDNS (fewer network services)

# -----------------------------------------------------------------------------
# API – Home Assistant
# Zostaw aby widzieć urządzenie w HA; usuń jeśli używasz tylko MQTT.
# Keep to see device in HA; remove if you use MQTT only.
# -----------------------------------------------------------------------------
api:

# -----------------------------------------------------------------------------
# OTA – aktualizacje przez Wi-Fi / over-the-air updates
# -----------------------------------------------------------------------------
ota:
  - platform: esphome

# Umożliwia pierwsze wgranie przez USB bez hasła
# Allows first flash via USB without password
improv_serial:

# -----------------------------------------------------------------------------
# CZAS / TIME
# Potrzebny do timestampów w logach i diagnostyce.
# Needed for log timestamps and diagnostics.
# -----------------------------------------------------------------------------
time:
  - platform: homeassistant   # synchronizacja z HA / sync with HA
  # - platform: sntp          # alternatywa bez HA / alternative without HA
  #   id: sntp_time

# -----------------------------------------------------------------------------
# MQTT BROKER
# Centralny punkt wymiany danych. Hass.io: zwykle 192.168.x.x
# Central data exchange point. Hass.io: usually 192.168.x.x
# -----------------------------------------------------------------------------
mqtt:
  broker: 192.168.1.10        # adres brokera MQTT / MQTT broker address
  username: !secret mqtt_user
  password: !secret mqtt_password
  # port: 1883                # domyślnie 1883 / default 1883

  # Logi ESPHome przekierowane na MQTT (opcjonalnie)
  # ESPHome logs redirected to MQTT (optional)
  log_topic:
    topic: "${devicename}/debug"
    level: DEBUG              # wszystkie logi / all logs

# =============================================================================
#  DIAGNOSTYKA ESP / ESP DIAGNOSTICS
#  Sensory dostępne w Home Assistant – wolna pamięć, temperatura, WiFi, itp.
#  Sensors available in Home Assistant – free memory, temperature, WiFi, etc.
# =============================================================================
debug:

sensor:
  - platform: uptime
    name: "Uptime"
  - platform: debug
    free:
      name: "Heap Free"
    block:
      name: "Heap Max Block"
    min_free:
      name: "Heap Min Free"
    loop_time:
      name: "Loop Time"
    psram:
      name: "Free PSRAM"
    cpu_frequency:
      name: "CPU Frequency"
  - platform: internal_temperature
    name: "MCU Temperature"
    update_interval: 60s
  - platform: wifi_signal
    name: "WiFi RSSI"
    update_interval: 60s

text_sensor:
  - platform: uptime
    name: "Uptime"
  - platform: debug
    device:
      name: "Device Info"
    reset_reason:
      name: "Reset Reason"
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "WiFi SSID"
    bssid:
      name: "WiFi BSSID"

# -----------------------------------------------------------------------------
# SPI BUS
# Heltec V4: CLK=9, MOSI=10, MISO=11 (nie zmieniaj bez sprawdzenia schematu)
# Heltec V4: CLK=9, MOSI=10, MISO=11 (don't change without checking schematic)
# -----------------------------------------------------------------------------
spi:
  clk_pin: GPIO9
  mosi_pin: GPIO10
  miso_pin: GPIO11

# =============================================================================
#  LED STATUSU / STATUS LED – Heltec WiFi LoRa 32 V4
#
#  Biała dioda (GPIO35) miga przy każdym odebranym telgramie wMBus.
#  White LED (GPIO35) blinks on every received wMBus telegram.
#
#  LED jest aktywne-niskie (inverted: true) – bez tego świeci cały czas.
#  LED is active-low (inverted: true) – without this it stays on permanently.
#
#  WAŻNE / IMPORTANT:
#  Miganie realizowane jest przez script: blink_led z mode: single.
#  Dzięki temu gdy ramki przychodzą szybko jedna po drugiej, animacja
#  nie nakłada się na siebie – nowe wywołanie jest ignorowane jeśli
#  poprzednie mignięcie jeszcze trwa. Bez tego przy bezpośrednim
#  output.turn_on/delay/turn_off LED świeciłaby ciągle lub migotała chaotycznie.
#
#  Blinking is handled by script: blink_led with mode: single.
#  This prevents animation overlap when frames arrive in rapid succession –
#  a new call is ignored if the previous blink is still in progress.
#  Without this, direct output.turn_on/delay/turn_off would cause the LED
#  to stay on permanently or flicker randomly under high frame load.
#
#  Żeby wyłączyć miganie / To disable blinking:
#    1) Usuń bloki output:, light: i script: / Remove output:, light: and script: blocks
#    2) Usuń linię "script.execute: blink_led" z on_frame
#       Remove "script.execute: blink_led" from on_frame
# =============================================================================
output:
  - platform: gpio
    id: led_output
    pin:
      number: GPIO35            # biała dioda na Heltec V4 / white LED on Heltec V4
      inverted: true            # aktywne-niskie / active-low

# -----------------------------------------------------------------------------
# LIGHT – binarny wrapper nad output / binary wrapper over output
#
# Wymagany przez script: który używa light.turn_on / light.turn_off.
# restore_mode: ALWAYS_OFF – nie świeć po restarcie / do not light up after restart.
# -----------------------------------------------------------------------------
light:
  - platform: binary
    name: "LED"
    output: led_output
    id: status_led
    restore_mode: ALWAYS_OFF

# -----------------------------------------------------------------------------
# SCRIPT – miganie LED / LED blink script
#
# mode: restart – każda nowa ramka resetuje timer mignięcia. LED świeci ciągle
# dopóki ramki przychodzą, gaśnie 50ms po ostatniej. Brak warningów w logu.
# mode: restart – each new frame resets the blink timer. LED stays on as long
# as frames keep arriving, turns off 50ms after the last one. No log warnings.
# -----------------------------------------------------------------------------
script:
  - id: blink_led
    mode: single
    then:
      - light.turn_on:
          id: status_led
      - delay: 50ms
      - light.turn_off:
          id: status_led

# =============================================================================
#  WMBUS RADIO – główna konfiguracja
#  WMBUS RADIO – main configuration
# =============================================================================
wmbus_radio:

  # ---------------------------------------------------------------------------
  # TYP RADIA / RADIO TYPE  [wymagane / required]
  # Obsługiwane: SX1262, SX1276
  # Supported: SX1262, SX1276
  # ---------------------------------------------------------------------------
  radio_type: SX1262

  # ---------------------------------------------------------------------------
  # PINY RADIA / RADIO PINS  [wymagane / required]
  # ---------------------------------------------------------------------------
  cs_pin: GPIO8               # SPI Chip Select
  reset_pin: GPIO12           # sprzętowy reset radia / hardware radio reset
  irq_pin:
    number: GPIO14
    mode: input               # IRQ/DIO1 – przerwanie od radia / radio interrupt

  busy_pin: GPIO13            # BUSY – poczekaj na gotowość radia (zalecany dla SX1262)
                               # BUSY – wait for radio ready (recommended for SX1262)
                               # Bez busy_pin: ESPHome odpytuje z timeoutem 200ms
                               # Without busy_pin: ESPHome polls with 200ms timeout

  # ---------------------------------------------------------------------------
  # PINY FEM / FEM PINS  [opcjonalne, tylko Heltec V4 / optional, Heltec V4 only]
  #
  # Heltec V4 ma zewnętrzny Front-End Module (LNA + przełącznik PA/RX).
  # Komponent ustawia te piny w setup() – RX path zawsze aktywny.
  # Heltec V4 has an external Front-End Module (LNA + PA/RX switch).
  # The component sets these pins in setup() – RX path always active.
  #
  # fem_en_pin:   LNA enable (GPIO2)  → HIGH = LNA włączone
  # fem_ctrl_pin: RX path select (GPIO7) → HIGH = tryb RX / RX mode
  # fem_pa_pin:   PA enable (GPIO46)  → LOW  = PA wyłączone (tylko RX)
  #
  # Jeśli nie masz Heltec V4 albo FEM jest obsługiwane inaczej – usuń te trzy linie.
  # If you don't have Heltec V4 or FEM is handled differently – remove these three lines.
  # ---------------------------------------------------------------------------
  fem_en_pin: GPIO2
  fem_ctrl_pin: GPIO7
  fem_pa_pin: GPIO46

  # ---------------------------------------------------------------------------
  # DIO2 jako wewnętrzny przełącznik RF / DIO2 as internal RF switch
  # true  = DIO2 steruje wewnętrznym switch (typowe dla modułów SX1262)
  # false = DIO2 jest zwykłym GPIO (rzadko potrzebne)
  # true  = DIO2 controls internal RF switch (typical for SX1262 modules)
  # false = DIO2 is a plain GPIO (rarely needed)
  # ---------------------------------------------------------------------------
  dio2_rf_switch: true        # domyślnie: true / default: true

  # ---------------------------------------------------------------------------
  # TCXO – Temperature Compensated Crystal Oscillator
  # true  = płytka ma TCXO (np. Heltec V4, większość modułów LoRa)
  # false = płytka ma zwykły kwarc (niestabilny, ale niektóre tanie klony)
  # true  = board has TCXO (e.g. Heltec V4, most LoRa modules)
  # false = board has plain crystal (unstable, but some cheap clones)
  #
  # Jeśli nagle tracisz odbiór po kilku minutach → spróbuj false
  # If you suddenly lose reception after a few minutes → try false
  # ---------------------------------------------------------------------------
  has_tcxo: true              # domyślnie: false / default: false

  # ---------------------------------------------------------------------------
  # WZMOCNIENIE RX / RX GAIN
  # boosted      = lepsza czułość (~2 dBm), ~2 mA więcej prądu
  # power_saving = oszczędność energii, nieco mniejszy zasięg
  # boosted      = better sensitivity (~2 dBm), ~2 mA more current
  # power_saving = power saving, slightly lower range
  # ---------------------------------------------------------------------------
  rx_gain: boosted            # domyślnie: boosted / default: boosted

  # ---------------------------------------------------------------------------
  # DŁUGIE PAKIETY GFSK / LONG GFSK PACKETS  (Semtech AN1200.53)
  #
  # false = tryb standardowy (limit ~255 bajtów w buforze sprzętowym)
  # true  = tryb AN1200.53: strumieniowanie z bufora kołowego, brak limitu ~255B
  #
  # Kiedy włączyć:
  #  → liczniki T-mode z długimi telegramami (po 3-of-6 dekodowaniu > 255 bajtów)
  #  → gdy masz dużo dropów "too_short" lub "decode_failed" przy trybie T1
  #  → środowisko z dużą ilością szumu (bardziej deterministyczny odbiór)
  #
  # false = standard mode (~255 byte hardware buffer limit)
  # true  = AN1200.53 mode: stream from circular buffer, no ~255B limit
  #
  # When to enable:
  #  → T-mode meters with long telegrams (after 3-of-6 decoding > 255 bytes)
  #  → when you see many "too_short" or "decode_failed" drops in T1 mode
  #  → noisy environment (more deterministic reception)
  # ---------------------------------------------------------------------------
  long_gfsk_packets: true     # domyślnie: false / default: false

  # ---------------------------------------------------------------------------
  # BŁĘDY RADIA PRZY STARCIE / RADIO ERRORS AT BOOT  (SX1262, opcjonalne)
  #
  # clear_device_errors_on_boot:
  #   Jednorazowo po pierwszym odebranym pakiecie: odczytaj i wyczyść rejestr
  #   błędów SX1262 (GetDeviceErrors / ClearDeviceErrors).
  #   Przydatne do diagnozy problemów oscylatora / zasilania przy starcie.
  #   Once after the first received packet: read and clear SX1262 error register
  #   (GetDeviceErrors / ClearDeviceErrors).
  #   Useful for diagnosing oscillator / power issues at boot.
  #
  # publish_dev_err_after_clear:
  #   Opublikuj wartości przed i po wyczyszczeniu jako event JSON na diagnostic_topic.
  #   Wymaga diagnostic_topic.
  #   Publish before/after error values as JSON event on diagnostic_topic.
  #   Requires diagnostic_topic.
  #
  # Przykładowy event: {"event":"dev_err_cleared","before":4,"before_hex":"0004","after":0,"after_hex":"0000"}
  # Jeśli "before"=0 zawsze → radio startuje czysto, można wyłączyć obie opcje.
  # If "before"=0 always → radio starts clean, both options can be disabled.
  # ---------------------------------------------------------------------------
  clear_device_errors_on_boot: true   # domyślnie: false / default: false
  publish_dev_err_after_clear: true   # domyślnie: false / default: false

  # ---------------------------------------------------------------------------
  # PODŚWIETLANIE LOGÓW / LOG HIGHLIGHTING  (opcjonalne)
  #
  # Wyróżnia wybrane liczniki w logach serial/API.
  # NIE filtruje MQTT – każda poprawna ramka i tak trafia do on_frame.
  #
  # Highlights selected meters in serial/API logs.
  # Does NOT filter MQTT – every valid frame still fires on_frame.
  #
  # highlight_meters: lista ID liczników (BCD, bez spacji)
  #                   list of meter IDs (BCD, no spaces)
  # highlight_ansi:   true = kolor ANSI zielony w logach (terminal/screen)
  #                   true = green ANSI color in logs (terminal/screen)
  # highlight_tag:    tag logu dla wyróżnionych / log tag for highlighted meters
  # highlight_prefix: prefiks przed treścią logu / prefix before log message
  # ---------------------------------------------------------------------------
  highlight_meters:
    - "12345678"
    # - "12345678"           # możesz dodać więcej / add more as needed
  highlight_ansi: true        # domyślnie: false / default: false
  highlight_tag: "wmbus_user" # domyślnie: "wmbus_user" / default: "wmbus_user"
  highlight_prefix: "★ "      # domyślnie: "★ " / default: "★ "

  # ---------------------------------------------------------------------------
  # DIAGNOSTYKA – MQTT / DIAGNOSTICS – MQTT  (opcjonalne)
  #
  # diagnostic_topic:
  #   Topic MQTT gdzie lądują JSON-y diagnostyczne.
  #   Jeśli pusty → diagnostyka wyłączona.
  #   MQTT topic for diagnostic JSON events.
  #   Empty string → diagnostics disabled.
  #
  # diagnostic_summary_interval:
  #   Co ile wysyłać podsumowanie (summary event).
  #   Minimum 5s (wymuszane przez kod).
  #   How often to send the summary event.
  #   Minimum 5s (enforced by code).
  #
  # diagnostic_verbose:
  #   true  = każdy drop/truncate pojawia się w logach serial/API
  #   false = logi serial/API ciche; eventy MQTT lecą ZAWSZE niezależnie
  #   true  = each drop/truncate appears in serial/API logs
  #   false = serial/API logs silent; MQTT events fire ALWAYS regardless
  #
  # diagnostic_publish_raw:
  #   true  = eventy dropped/truncated na MQTT zawierają pole "raw" z HEX
  #           (do analizy w wmbusmeters.org/analyze)
  #   false = bez pola "raw" (mniejszy payload MQTT, mniej ruchu)
  #   true  = dropped/truncated MQTT events include "raw" HEX field
  #           (for analysis at wmbusmeters.org/analyze)
  #   false = no "raw" field (smaller MQTT payload, less traffic)
  # ---------------------------------------------------------------------------
  diagnostic_topic: "wmbus/diag"        # domyślnie: "wmbus/diag" / default: "wmbus/diag"
  diagnostic_summary_interval: 120s     # domyślnie: 60s / default: 60s
  diagnostic_verbose: false             # domyślnie: true / default: true
  diagnostic_publish_raw: true          # domyślnie: true / default: true

  # ---------------------------------------------------------------------------
  # ON_FRAME – callback wywoływany dla każdej poprawnej ramki
  # ON_FRAME – callback called for every valid frame
  #
  # Dostępne metody na obiekcie "frame" / Available methods on "frame" object:
  #
  #   frame->as_hex()       → std::string  – telegram w HEX (dla wmbusmeters)
  #   frame->as_raw()       → vector<u8>   – surowe bajty ramki
  #   frame->as_rtlwmbus()  → std::string  – format rtl-wmbus: "T1;1;1;timestamp;rssi;hex"
  #   frame->rssi()         → int8_t       – RSSI w dBm (np. -74)
  #   frame->link_mode()    → LinkMode     – tryb T1 lub C1
  #   frame->format()       → std::string  – format bloku: "A" lub "B"
  #
  # mark_as_handled:
  #   false (domyślnie) = komponent loguje "Telegram not handled by any handler"
  #   true              = komponent loguje "Telegram handled by N handlers"
  #   false (default)   = component logs "Telegram not handled by any handler"
  #   true              = component logs "Telegram handled by N handlers"
  # ---------------------------------------------------------------------------
  on_frame:
    mark_as_handled: true     # domyślnie: false / default: false
    then:

      # -----------------------------------------------------------------------
      # PUBLIKACJA TELEGRAMU DO WMBUSMETERS / PUBLISH TELEGRAM TO WMBUSMETERS
      # To jest główny payload – wmbusmeters/HA addon czyta ten topic.
      # This is the main payload – wmbusmeters/HA add-on reads this topic.
      # -----------------------------------------------------------------------
      - mqtt.publish:
          topic: "wmbus_bridge/telegram"
          payload: !lambda |-
            return frame->as_hex();

      # -----------------------------------------------------------------------
      # MIGANIE LED / LED BLINK – przy każdym telgramie wMBus
      #
      # Wizualne potwierdzenie że radio odebrało ramkę.
      # Visual confirmation that the radio received a frame.
      #
      # script.execute zamiast bezpośredniego output.turn_on/delay/turn_off.
      # mode: single w skrypcie zapewnia że mignięcia się nie nakładają –
      # szczegóły w komentarzu przy bloku script: powyżej.
      #
      # script.execute instead of direct output.turn_on/delay/turn_off.
      # mode: single in the script ensures blinks do not overlap –
      # see comment at script: block above for details.
      #
      # Żeby wyłączyć / To disable:
      #   1) Usuń tę linię / Remove this line
      #   2) Usuń bloki output:, light: i script: / Remove output:, light: and script: blocks
      # -----------------------------------------------------------------------
      - script.execute: blink_led

      # -----------------------------------------------------------------------
      # OPCJONALNIE: RSSI na osobnym topicu
      # OPTIONAL: RSSI on a separate topic
      #
      # Przydatne gdy chcesz monitorować jakość sygnału w HA jako sensor.
      # Useful when you want to monitor signal quality in HA as a sensor.
      # -----------------------------------------------------------------------
      # - mqtt.publish:
      #     topic: "wmbus_bridge/rssi"
      #     payload: !lambda |-
      #       return to_string((int) frame->rssi());

      # -----------------------------------------------------------------------
      # OPCJONALNIE: Format rtl-wmbus (jeśli masz narzędzie które go czyta)
      # OPTIONAL: rtl-wmbus format (if you have a tool that consumes it)
      #
      # Format: T1;1;1;2026-03-01 12:00:00;-74;2F2F...hex...
      # -----------------------------------------------------------------------
      # - mqtt.publish:
      #     topic: "wmbus_bridge/rtlwmbus"
      #     payload: !lambda |-
      #       return frame->as_rtlwmbus();

      # -----------------------------------------------------------------------
      # OPCJONALNIE: Dynamiczny topic per licznik (ID w topicu)
      # OPTIONAL: Dynamic topic per meter (meter ID in topic path)
      #
      # Bajty 4-7 HEX (pozycje 8-15) to ID licznika dla C-mode Format A.
      # Bytes 4-7 HEX (positions 8-15) are meter ID for C-mode Format A.
      #
      # Uwaga: pozycja ID zależy od formatu ramki – to przykład orientacyjny.
      # Note: ID position depends on frame format – this is an indicative example.
      # -----------------------------------------------------------------------
      # - mqtt.publish:
      #     topic: !lambda |-
      #       const auto &h = frame->as_hex();
      #       if (h.size() >= 16)
      #         return std::string("wmbus_bridge/meter/") + h.substr(8, 8);
      #       return std::string("wmbus_bridge/meter/unknown");
      #     payload: !lambda |-
      #       return frame->as_hex();
